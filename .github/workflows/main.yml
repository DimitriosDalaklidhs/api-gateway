name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r gateway/requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check gateway/ --ignore F401

      - name: Run tests
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET_KEY: ci-test-secret
        run: |
          cd gateway
          pytest tests/ -v --asyncio-mode=auto
