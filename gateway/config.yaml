gateway:
  host: "0.0.0.0"
  port: 8000
  debug: false
  title: "API Gateway"
  version: "1.0.0"

redis:
  host: "redis"
  port: 6379
  db: 0
  password: null

rate_limiting:
  enabled: true
  default_limit: 100
  window_seconds: 60
  ban_duration_seconds: 300

circuit_breaker:
  failure_threshold: 5
  recovery_timeout_seconds: 30
  half_open_max_calls: 3

retry:
  max_attempts: 3
  backoff_factor: 0.5
  retry_on_status: [500, 502, 503, 504]

proxy:
  timeout_seconds: 30
  connect_timeout_seconds: 5

routes:
  - path: "/users"
    target: "http://user-service:8001"
    rate_limit: 100
    strip_prefix: false
    methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
    auth_required: true

  - path: "/orders"
    target: "http://order-service:8002"
    rate_limit: 50
    strip_prefix: false
    methods: ["GET", "POST", "PUT", "DELETE"]
    auth_required: true

  - path: "/public"
    target: "http://public-service:8003"
    rate_limit: 200
    strip_prefix: true
    methods: ["GET"]
    auth_required: false

  - path: "/mock"
    target: "http://mock-service:8010"
    rate_limit: 1000
    strip_prefix: false
    methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
    auth_required: false

jwt:
  secret_key: "super-secret-change-in-production"
  algorithm: "HS256"
  expire_minutes: 60

logging:
  level: "INFO"
  file: "logs/gateway.log"
  max_bytes: 10485760
  backup_count: 5

caching:
  enabled: true
  default_ttl_seconds: 60
  cacheable_methods: ["GET"]
  cache_prefix: "cache:"